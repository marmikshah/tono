<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>tono — pattern station</title>
    <style>
      :root {
        --bg: #14131a;
        --panel: #1d1b26;
        --line: #322f40;
        --ink: #e9e6f2;
        --dim: #8f8aa6;
        --accent: #8c6ee6;
        --accent-dim: #5d4a9e;
        --cell: #262233;
        --cell-beat: #2c2839;
        --good: #6ee6a8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        font: 13px/1.5 -apple-system, system-ui, sans-serif;
        background: var(--bg);
        color: var(--ink);
        height: 100vh;
        display: flex;
        flex-direction: column;
        user-select: none;
      }
      header {
        padding: 10px 16px;
        border-bottom: 1px solid var(--line);
        display: flex;
        align-items: center;
        gap: 14px;
        flex-wrap: wrap;
      }
      header h1 { font-size: 14px; margin: 0 8px 0 0; font-weight: 600; }
      header h1 span { color: var(--accent); }
      .tbtn {
        background: var(--panel);
        border: 1px solid var(--line);
        color: var(--ink);
        border-radius: 6px;
        padding: 5px 12px;
        cursor: pointer;
        font-size: 13px;
      }
      .tbtn:hover { border-color: var(--accent); }
      .tbtn:disabled { opacity: 0.35; cursor: default; }
      .tbtn.active { background: var(--accent-dim); border-color: var(--accent); }
      label.knob { color: var(--dim); display: flex; align-items: center; gap: 6px; }
      input[type="number"], input[type="text"] {
        background: var(--panel);
        border: 1px solid var(--line);
        color: var(--ink);
        border-radius: 6px;
        padding: 4px 8px;
        width: 64px;
      }
      input[type="range"] { accent-color: var(--accent); }
      main { flex: 1; overflow: auto; padding: 16px; display: flex; flex-direction: column; gap: 16px; }
      .grid { border-collapse: separate; border-spacing: 3px; }
      .grid td.label {
        color: var(--dim);
        padding-right: 8px;
        text-align: right;
        white-space: nowrap;
        font-size: 12px;
      }
      .grid td.pitch input { width: 52px; font-size: 11px; padding: 2px 6px; text-align: center; }
      .cell {
        width: 34px;
        height: 26px;
        border-radius: 5px;
        background: var(--cell);
        cursor: pointer;
        border: 1px solid transparent;
      }
      .cell.beat { background: var(--cell-beat); }
      .cell:hover { border-color: var(--accent-dim); }
      .cell.on { background: var(--accent); }
      .cell.on:hover { border-color: var(--ink); }
      .cell.head { border-color: var(--good); }
      .row-gap td { height: 6px; padding: 0; }
      #mixer { display: flex; gap: 24px; flex-wrap: wrap; }
      .chan {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 10px 14px;
        display: flex;
        flex-direction: column;
        gap: 6px;
        min-width: 180px;
      }
      .chan .name { font-weight: 600; display: flex; justify-content: space-between; align-items: center; }
      .chan label { color: var(--dim); font-size: 11px; display: flex; align-items: center; gap: 8px; }
      .chan input[type="range"] { flex: 1; }
      footer {
        border-top: 1px solid var(--line);
        padding: 10px 16px;
        display: flex;
        gap: 20px;
        align-items: center;
        flex-wrap: wrap;
      }
      footer .stat { color: var(--dim); font-size: 12px; }
      footer .stat b { color: var(--ink); font-weight: 600; }
      footer img { height: 56px; border-radius: 6px; border: 1px solid var(--line); background: var(--panel); }
      #error { color: #e66e8a; font-size: 12px; }
      .spacer { flex: 1; }
    </style>
  </head>
  <body>
    <header>
      <h1><span>tono</span> pattern station</h1>
      <button class="tbtn" id="play" title="space">▶</button>
      <button class="tbtn" id="pause">⏸</button>
      <button class="tbtn" id="stop">⏹</button>
      <label class="knob">bpm <input type="number" id="bpm" min="30" max="300" step="1" /></label>
      <label class="knob">swing <input type="range" id="swing" min="0" max="1" step="0.01" style="width:90px" /></label>
      <button class="tbtn" id="undo" title="cmd+z">undo</button>
      <button class="tbtn" id="redo" title="shift+cmd+z">redo</button>
      <span class="spacer"></span>
      <input type="text" id="path" style="width:220px" value="~/tono-pattern.json" spellcheck="false" />
      <button class="tbtn" id="save">save</button>
      <button class="tbtn" id="load">load</button>
    </header>

    <main>
      <table class="grid" id="grid"></table>
      <div id="mixer"></div>
      <div id="error"></div>
    </main>

    <footer>
      <span class="stat">loudness <b id="lufs">—</b></span>
      <span class="stat">true peak <b id="tp">—</b></span>
      <span class="stat">loop <b id="dur">—</b></span>
      <span class="spacer"></span>
      <img id="wave" alt="" title="waveform" />
      <img id="spec" alt="" title="spectrogram" />
    </footer>

    <script>
      const invoke = (cmd, args) => window.__TAURI__.core.invoke(cmd, args);
      const $ = (id) => document.getElementById(id);
      let state = null;

      // ---- render: the webview is a pure view of StudioState -------------
      function render(s) {
        state = s;
        $("bpm").value = Math.round(s.bpm);
        $("swing").value = s.swing;
        $("undo").disabled = !s.can_undo;
        $("redo").disabled = !s.can_redo;
        $("error").textContent = s.error || "";
        renderGrid(s);
        renderMixer(s);
        scheduleAnalysis();
      }

      function renderGrid(s) {
        const grid = $("grid");
        grid.textContent = "";
        let lastTrack = null;
        s.rows.forEach((row, ri) => {
          if (lastTrack !== null && row.track !== lastTrack) {
            const gap = grid.insertRow();
            gap.className = "row-gap";
            gap.insertCell().colSpan = s.steps + 2;
          }
          lastTrack = row.track;
          const tr = grid.insertRow();
          const label = tr.insertCell();
          label.className = "label";
          label.textContent = row.label;
          const pitch = tr.insertCell();
          pitch.className = "pitch";
          if (!row.pitch.startsWith("midi:")) {
            const input = document.createElement("input");
            input.value = row.pitch;
            input.onchange = () => act("set_row_pitch", { row: ri, pitch: input.value });
            pitch.appendChild(input);
          }
          for (let step = 0; step < s.steps; step++) {
            const td = tr.insertCell();
            td.className = "cell" + (Math.floor(step / s.steps_per_beat) % 2 ? " beat" : "") + (row.steps[step] ? " on" : "");
            td.dataset.step = step;
            td.onpointerdown = () => act("toggle_step", { row: ri, step });
          }
        });
      }

      function renderMixer(s) {
        const mixer = $("mixer");
        mixer.textContent = "";
        for (const t of s.tracks) {
          const chan = document.createElement("div");
          chan.className = "chan";
          const name = document.createElement("div");
          name.className = "name";
          name.textContent = t.name;
          const mute = document.createElement("button");
          mute.className = "tbtn" + (t.muted ? " active" : "");
          mute.textContent = "M";
          mute.onclick = () => act("set_track", { name: t.name, gain: t.gain, pan: t.pan, muted: !t.muted });
          name.appendChild(mute);
          chan.appendChild(name);
          const slider = (label, min, max, value, oninput) => {
            const wrap = document.createElement("label");
            wrap.textContent = label;
            const input = document.createElement("input");
            input.type = "range";
            input.min = min;
            input.max = max;
            input.step = 0.01;
            input.value = value;
            input.onchange = oninput; // commit on release: one undo step per move
            wrap.appendChild(input);
            chan.appendChild(wrap);
            return input;
          };
          const gain = slider("vol", 0, 1.5, t.gain, () =>
            act("set_track", { name: t.name, gain: +gain.value, pan: +pan.value, muted: t.muted }));
          const pan = slider("pan", -1, 1, t.pan, () =>
            act("set_track", { name: t.name, gain: +gain.value, pan: +pan.value, muted: t.muted }));
        }
      }

      // ---- commands -------------------------------------------------------
      async function act(cmd, args) {
        render(await invoke(cmd, args));
      }

      $("bpm").onchange = () => act("set_bpm", { bpm: +$("bpm").value });
      $("swing").onchange = () => act("set_swing", { swing: +$("swing").value });
      $("undo").onclick = () => act("undo");
      $("redo").onclick = () => act("redo");
      $("save").onclick = async () => {
        try { await invoke("save_project", { path: $("path").value }); flashError(""); }
        catch (e) { flashError("save failed: " + e); }
      };
      $("load").onclick = async () => {
        try { render(await invoke("load_project", { path: $("path").value })); }
        catch (e) { flashError("load failed: " + e); }
      };
      const flashError = (msg) => { $("error").textContent = msg; };

      const transport = async (action) => {
        try { await invoke("transport", { action }); flashError(""); }
        catch (e) { flashError(e); }
      };
      $("play").onclick = () => transport("play");
      $("pause").onclick = () => transport("pause");
      $("stop").onclick = () => transport("stop");

      addEventListener("keydown", (e) => {
        if (/^(input|textarea|select)$/i.test(e.target.tagName)) return;
        if (e.key === " ") { e.preventDefault(); transport("play"); }
        if (e.key === "z" && (e.metaKey || e.ctrlKey)) {
          e.preventDefault();
          act(e.shiftKey ? "redo" : "undo");
        }
      });

      // ---- playhead: poll at 20 Hz, highlight the current column ----------
      let lastHead = -1;
      setInterval(async () => {
        const { playing, step } = await invoke("playhead");
        const head = playing ? step : -1;
        if (head === lastHead) return;
        lastHead = head;
        document.querySelectorAll(".cell.head").forEach((c) => c.classList.remove("head"));
        if (head >= 0)
          document.querySelectorAll(`.cell[data-step="${head}"]`).forEach((c) => c.classList.add("head"));
      }, 50);

      // ---- analysis strip: debounced behind edits --------------------------
      let analysisTimer = null;
      function scheduleAnalysis() {
        clearTimeout(analysisTimer);
        analysisTimer = setTimeout(async () => {
          const a = await invoke("analyze");
          $("lufs").textContent = a.ok ? a.lufs.toFixed(1) + " LUFS" : "—";
          $("tp").textContent = a.ok ? a.true_peak_dbtp.toFixed(1) + " dBTP" : "—";
          $("dur").textContent = a.ok ? a.duration.toFixed(2) + " s" : "—";
          $("spec").src = a.ok ? "data:image/png;base64," + a.spectrogram_png : "";
          $("wave").src = a.ok ? "data:image/png;base64," + a.waveform_png : "";
        }, 350);
      }

      act("state");
    </script>
  </body>
</html>
