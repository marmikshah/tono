<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>sonarium — studio</title>
<style>
  :root { color-scheme: dark; }
  * { box-sizing: border-box; }
  body { margin:0; height:100vh; display:flex; flex-direction:column; background:#100e1a; color:#dfe3ea;
         font:14px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
  .bar { display:flex; gap:.5rem; align-items:center; padding:.6rem .8rem; border-bottom:1px solid #2c2746; }
  button,select { font:inherit; color:#dfe3ea; background:#241f3a; border:1px solid #3a3360; border-radius:7px; padding:.45rem .7rem; cursor:pointer; }
  button.primary { background:#50dca0; color:#0c1019; border-color:#50dca0; font-weight:600; }
  textarea { flex:1; width:100%; background:#0d0b16; color:#cdd3df; border:none; border-right:1px solid #2c2746;
             padding:.8rem; font:12px/1.5 ui-monospace,Menlo,monospace; resize:none; }
  main { flex:1; display:grid; grid-template-columns:1fr 1fr; min-height:0; }
  .side { overflow:auto; padding:.8rem; }
  figure { margin:0 0 .7rem; } img { width:100%; border-radius:8px; background:#0d0b16; border:1px solid #2c2746; display:block; }
  figcaption { font-size:.7rem; color:#6f7891; margin-top:.2rem; }
  .stats { display:grid; grid-template-columns:1fr 1fr 1fr; gap:.4rem; }
  .stat { background:#0d0b16; border:1px solid #2c2746; border-radius:7px; padding:.35rem .5rem; }
  .stat .k { font-size:.62rem; color:#6f7891; } .stat .v { font-size:.95rem; font-variant-numeric:tabular-nums; }
  #status { padding:.35rem .8rem; font-size:.78rem; border-top:1px solid #2c2746; }
  #status.err { color:#ff8092; } #status.ok { color:#50dca0; }
  .note { padding:.3rem .8rem; font-size:.72rem; color:#6f7891; }
</style>
</head>
<body>
<div class="bar">
  <strong style="letter-spacing:.04em">sonarium</strong>
  <span style="font-size:.66rem;color:#6f7891;border:1px solid #2c2746;border-radius:20px;padding:.05rem .45rem">studio</span>
  <button id="play" class="primary">▶ Play</button>
  <button id="stop">■ Stop</button>
  <select id="examples"></select>
  <span style="flex:1"></span>
  <span style="font-size:.72rem;color:#6f7891">native real-time audio · edits play live</span>
</div>
<main>
  <textarea id="editor" spellcheck="false"></textarea>
  <div class="side">
    <figure><img id="spec"><figcaption>SPECTROGRAM</figcaption></figure>
    <figure><img id="wave"><figcaption>WAVEFORM</figcaption></figure>
    <div class="stats" id="stats"></div>
  </div>
</main>
<div id="status"></div>
<div class="note">Scaffold frontend — the full node patcher (from the web playground) ports onto these same commands next.</div>

<script>
const invoke = (cmd, args) => window.__TAURI__.core.invoke(cmd, args);
const $ = s => document.querySelector(s);
const EXAMPLES = {
  'laser zap': { name:'laser_zap', duration:0.22, sample_rate:44100, root:{ type:'mix', inputs:[
    { type:'mul', inputs:[ { type:'square', duty:0.25, freq:{ slide:{ from:880, to:180, secs:0.18, curve:'exp' } } }, { type:'env', a:0, d:0.18, s:0, r:0.02, punch:0.3 } ] },
    { type:'mul', inputs:[ { type:'noise', color:'white' }, { type:'env', a:0, d:0.04, s:0, r:0 } ] } ] } },
  'coin pickup': { name:'coin', duration:0.18, sample_rate:44100, root:{ type:'mul', inputs:[
    { type:'square', duty:0.5, freq:{ arp:{ steps:[988,1319], rate:14 } } }, { type:'env', a:0, d:0.16, s:0, r:0, punch:0.2 } ] } },
};
const STAT = [['peak_dbfs','peak dB',1],['loudness_lufs','LUFS',1],['spectral_centroid_hz','centroid',0]];
let timer = null;

async function renderNow() {
  let res;
  try { res = await invoke('render_graph', { graph: $('#editor').value }); }
  catch (e) { setStatus('err', String(e)); return; }
  if (!res.ok) { setStatus('err', res.error || 'render failed'); return; }
  if (res.spectrogram_png) $('#spec').src = 'data:image/png;base64,' + res.spectrogram_png;
  if (res.waveform_png) $('#wave').src = 'data:image/png;base64,' + res.waveform_png;
  const s = JSON.parse(res.stats_json);
  $('#stats').innerHTML = STAT.map(([k,l,d]) => `<div class="stat"><div class="k">${l}</div><div class="v">${typeof s[k]==='number'?s[k].toFixed(d):'—'}</div></div>`).join('');
  setStatus('ok', `✓ ${res.duration.toFixed(2)}s · ${res.sample_rate} Hz`);
}
function setStatus(c, m) { const e = $('#status'); e.className = c; e.textContent = m; }
function schedule() { clearTimeout(timer); timer = setTimeout(renderNow, 250); }

$('#editor').addEventListener('input', schedule);
$('#play').addEventListener('click', () => invoke('transport', { action: 'play' }));
$('#stop').addEventListener('click', () => invoke('transport', { action: 'stop' }));
const sel = $('#examples');
for (const k of Object.keys(EXAMPLES)) { const o = document.createElement('option'); o.textContent = k; sel.appendChild(o); }
sel.addEventListener('change', () => { $('#editor').value = JSON.stringify(EXAMPLES[sel.value], null, 2); renderNow(); });

window.addEventListener('DOMContentLoaded', () => {
  $('#editor').value = JSON.stringify(EXAMPLES['laser zap'], null, 2);
  renderNow();
});
</script>
</body>
</html>
