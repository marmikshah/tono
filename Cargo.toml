[package]
name = "sonarium"
version = "0.1.0"
edition = "2024"
rust-version = "1.88"
description = "An MCP server that turns an AI agent into a sound engineer — instruments, effects, and sequencing driven by tool calls, rendered deterministically to audio."
license = "MIT"
repository = "https://github.com/marmikshah/sonarium"
readme = "README.md"
keywords = ["mcp", "audio", "synthesis", "chiptune", "gamedev"]
categories = ["multimedia::audio", "game-development"]

[dependencies]
schemars = "1.2.1"
serde = { version = "1.0.228", features = ["derive"] }
serde_json = "1.0.150"
