name: CI

on:
  push:
    branches: [master]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  build-test:
    # Both pinned golden-corpus platforms: the per-platform render hashes
    # (macos-aarch64 vs linux-x86_64) must each be CI-validated.
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Verify
        # The one gate — identical to the pre-push hook and `make verify`.
        run: make verify
