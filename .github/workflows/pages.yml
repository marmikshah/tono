name: Pages

# Deploys the showcase site (site/index.html + the demo audio and images from
# docs/) to GitHub Pages on every master push that touches them.

on:
  push:
    branches: [master]
    paths:
      - "site/**"
      - "docs/examples/audio/**"
      - "docs/*.png"
      - ".github/workflows/pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v5
      - name: Assemble the site
        run: make site
      - uses: actions/upload-pages-artifact@v4
        with:
          path: _site
      - id: deployment
        uses: actions/deploy-pages@v4
