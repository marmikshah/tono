name: Python

# The PyO3 bindings (crates/tono-py) are off the default build/CI (a non-default
# workspace member), so this is their own gate: a determinism smoke test plus abi3
# wheels (Linux, Windows, Apple Silicon — universal2 was dropped: it doubled the
# macOS build minutes to cover Intel Macs we don't support). It does not touch
# the main `CI` workflow.

on:
  push:
    branches: [master]
    paths:
      - "crates/tono-py/**"
      - "crates/tono-core/**"
      - "crates/tono-play/**"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "crates/tono-py/**"
      - "crates/tono-core/**"
      - "crates/tono-play/**"
      - ".github/workflows/python.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Smoke test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install ALSA headers (cpal build dep)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build, install, and smoke-test the extension
        # `maturin develop` needs an active virtualenv (absent on CI's system
        # Python), so the target builds a wheel and pip-installs it instead.
        run: make python-smoke

  wheels:
    name: Wheels (${{ matrix.platform.os }})
    needs: test
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: ubuntu-latest
            # A container build (yum-based AlmaLinux 8) so the wheel is glibc-2.28
            # compliant instead of linking the host's newer libs.
            manylinux: "2_28"
            args: --release
          - os: macos-latest
            manylinux: auto
            # Apple Silicon only: universal2 compiled arm64 + Intel in one job.
            args: --release --target aarch64-apple-darwin
          - os: windows-latest
            manylinux: auto
            args: --release
    steps:
      - uses: actions/checkout@v5
      - uses: PyO3/maturin-action@v1
        with:
          command: build
          # `manylinux` as an action input runs the Linux build INSIDE the
          # container (ignored on macOS/Windows); passing it in `args` instead
          # builds on the host and fails the compliance audit.
          manylinux: ${{ matrix.platform.manylinux }}
          # abi3-py39: one wheel per platform covers every CPython 3.9+.
          args: ${{ matrix.platform.args }} --out dist -m crates/tono-py/Cargo.toml
          # cpal needs ALSA dev headers to build. yum inside the manylinux
          # container (root), apt on a Debian host (needs sudo).
          before-script-linux: |
            if command -v yum >/dev/null; then yum install -y alsa-lib-devel; fi
            if command -v apt-get >/dev/null; then
              (sudo apt-get update && sudo apt-get install -y libasound2-dev) \
                || (apt-get update && apt-get install -y libasound2-dev)
            fi
      - uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.platform.os }}
          path: dist
