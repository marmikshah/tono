name: Python

# The PyO3 bindings (crates/tono-py) are off the default build/CI (a non-default
# workspace member), so this is their own gate: a determinism smoke test on the
# changes that could break them. Wheel builds moved to wheels.yml — they run
# only on release tags (PRs were paying the 3-platform matrix, 10x-cost macOS
# included, for artifacts nobody ships until a release). It does not touch the
# main `CI` workflow.

on:
  push:
    branches: [master]
    paths:
      - "crates/tono-py/**"
      - "crates/tono-core/**"
      - "crates/tono-play/**"
      - ".github/workflows/python.yml"
  pull_request:
    paths:
      - "crates/tono-py/**"
      - "crates/tono-core/**"
      - "crates/tono-play/**"
      - ".github/workflows/python.yml"

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Smoke test (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - uses: actions/setup-python@v5
        with:
          python-version: "3.9"
      - name: Install ALSA headers (cpal build dep)
        run: sudo apt-get update && sudo apt-get install -y libasound2-dev
      - name: Build, install, and smoke-test the extension
        # `maturin develop` needs an active virtualenv (absent on CI's system
        # Python), so the target builds a wheel and pip-installs it instead.
        run: make python-smoke
